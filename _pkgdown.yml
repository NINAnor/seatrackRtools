url: https://ninanor.github.io/seatrackRtools/
template:
  bootstrap: 5
reference:
  - title: Start interface
    desc: Run a shiny app to perform (some) of the functions below
    contents:
      - has_concept("shiny_app")
  - title: Setup functions
    desc: Functions to set up the sea track folder and paths.
    contents:
      - has_concept("setup")
  - title: GLS functions
    desc: Functions to assist in running the within-seatrack GLS pipeline
    contents:
      - has_concept("gls_helper")
  - title: Metdata functions
    desc: Functions to handle and process metadata sheets.
  - subtitle: General metadata functions
    contents:
      - has_concept("metadata")
  - subtitle: Logger metadata functions
    desc: Functions to load logger data
    contents:
      - has_concept("loggers")
  - subtitle: Nonresponsive logger metadata functions
    desc: Functions to load and update non-responsive sheets
    contents:
      - has_concept("nonresponsive")
  - subtitle: Startup metadata functions
    desc: Functions to load and update startup sheets
    contents:
      - has_concept("startups")
  - subtitle: Encounter metadata functions
    desc: Functions to load and update encounter data
    contents:
      - has_concept("encounters")
  - title: Database import
    desc: Functions to import data into the Database
  - subtitle: Metadata preperation functions
    contents:
      - has_concept("db_import_prep")
  - subtitle: Metadata upload functions
    contents:
      - has_concept("db_import")
  - subtitle: Activity data preperation functions
    contents:
      - has_concept("activity_db_prep")      
  - subtitle: Activity data upload functions
    contents:
      - has_concept("activity_db_import")  
  - title: Field planning sheet functions
    desc: Functions to load and handle data from the field planning sheet
    contents:
      - has_concept("field_planning")
  - title: Website metadata app
    desc: Functions relating to the updating and publishing of the website metadata app
    contents:
      - has_concept("web_metadata_app")
  - title: Annual report
  - subtitle: Appendix table createion
    desc: Functions to create and export annual report appendix tables
    contents:
      - has_concept("annual_report")
  - title: General utility functions
    contents:
      - has_concept("utility")
  - title: Database utility functions
    contents:
      - has_concept("db_import_utility")
  - title: Classes
    contents:
      - LoadedWB
      - LoadedWBCollection
      - SessionBatch
      - DBImportCollection
  - title: ColonyRepr prep
    desc: Functions to assist in working with the ColonyRepr-package
    contents:
      - has_concept("ColonyRepr")
  - title: Data request handling
    desc: Functions for managing data requests in the database.
    contents: has_concept("data_requests")

